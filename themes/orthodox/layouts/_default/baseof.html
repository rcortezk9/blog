<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.tagline }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var pref = (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : saved;
      if (pref === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a class="site-name" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
      <div class="nav-links">
        <a href="{{ "posts/" | relURL }}">Posts</a>
        <a href="{{ "books/" | relURL }}">Books</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">&#9728;</button>
      </div>
    </nav>
    {{ if .Site.Params.tagline }}
    <p class="site-tagline">{{ .Site.Params.tagline }}</p>
    {{ end }}
  </header>

  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>{{ .Site.Title }} &mdash; <em>{{ .Site.Params.tagline }}</em></p>
      <p class="footer-copy">&copy; {{ now.Format "2006" }}{{ with .Site.Params.author }} {{ . }}{{ end }}</p>
    </div>
  </footer>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var html = document.documentElement;
      function sync() {
        var dark = html.getAttribute('data-theme') === 'dark';
        btn.innerHTML = dark ? '&#9789;' : '&#9728;';
        btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
      }
      sync();
      btn.addEventListener('click', function() {
        var dark = html.getAttribute('data-theme') === 'dark';
        if (dark) {
          html.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        } else {
          html.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        }
        sync();
      });
    })();
  </script>
</body>
</html>
